<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>在庫管理B ログイン</title>
  <style>
    :root{ --bg:#f6f7f9; --card:#fff; --border:#e5e7eb; --muted:#666; --radius:14px; --pad:16px; --btn-h:64px; --font:20px; }
    *{ box-sizing:border-box; }
    body{ margin:0; padding:14px; background:var(--bg); font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif; font-size:var(--font); }
    .card{ width:80%; max-width:560px; margin:10px auto; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:var(--pad); box-shadow:0 6px 16px rgba(0,0,0,.06); }
    h1{ margin:0 0 12px; font-size:22px; }
    label{ display:block; margin-top:14px; font-weight:800; }
    input, button{ width:100%; font-size:20px; padding:12px 14px; border-radius:12px; border:1px solid var(--border); background:#fff; }
    button{ height:var(--btn-h); border:none; font-weight:900; cursor:pointer; }
    button.primary{ background:#111; color:#fff; }
    button.secondary{ background:#e5e7eb; color:#111; }
    .row{ display:flex; gap:10px; margin-top:12px; }
    .row>*{ flex:1; }
    .msg{ margin-top:12px; padding:10px 12px; border-radius:12px; font-size:15px; }
    .msg.ok{ background:#ecfdf5; color:#065f46; border:1px solid #a7f3d0; }
    .msg.err{ background:#fef2f2; color:#991b1b; border:1px solid #fecaca; white-space:pre-wrap; }
    .muted{ color:var(--muted); font-size:14px; margin-top:10px; }
  </style>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div style="position:fixed;top:4px;right:6px;z-index:9999;font-size:12px;color:#666;background:#fff;border:1px solid #ddd;border-radius:4px;padding:2px 6px;" id="versionLabel">github-pages-b-2026-06-26-01</div>
  <div class="card">
    <h1>在庫管理B ログイン</h1>

    <div id="autoArea" style="display:none;">
      <div class="msg ok" id="autoMsg"></div>
      <div class="row">
        <button class="primary" id="btnContinue">この作業者で続行</button>
        <button class="secondary" id="btnChange">作業者を変更</button>
      </div>
      <div class="muted">※個人スマホ運用向けに、作業者番号は端末に保存されます。</div>
    </div>

    <div id="loginArea" style="display:none;">
      <label for="workerCode">作業者番号（4桁）</label>
      <input id="workerCode" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="0001">
      <button class="primary" id="btnLogin">ログイン</button>
      <div class="msg err" id="errMsg" style="display:none;"></div>
      <div class="muted">例：0001（先頭ゼロあり）</div>
    </div>

    <div class="muted" id="dbg"></div>
  </div>

<script>
  const LS_KEY = 'inventory_worker';

  const autoArea = document.getElementById('autoArea');
  const loginArea = document.getElementById('loginArea');
  const autoMsg = document.getElementById('autoMsg');
  const errMsg = document.getElementById('errMsg');
  const workerCodeInput = document.getElementById('workerCode');

  const btnLogin = document.getElementById('btnLogin');
  const btnContinue = document.getElementById('btnContinue');
  const btnChange = document.getElementById('btnChange');

  const dbg = document.getElementById('dbg');
  dbg.textContent = 'page: index';

  window.addEventListener('error', (e) => showError('JS Error: ' + (e.message || e)));
  window.addEventListener('unhandledrejection', (e) => showError('Promise Error: ' + (e.reason?.message || e.reason || e)));

  function showError(message) {
    errMsg.textContent = String(message || 'unknown error');
    errMsg.style.display = 'block';
  }
  function clearError() {
    errMsg.textContent = '';
    errMsg.style.display = 'none';
  }

  function loadSavedWorker() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (!obj || !obj.code || !obj.name) return null;
      return obj;
    } catch (e) {
      return null;
    }
  }
  function saveWorker(worker) { localStorage.setItem(LS_KEY, JSON.stringify(worker)); }
  function clearWorker() { localStorage.removeItem(LS_KEY); }

  function goMain(worker) { navTo('main', { worker_code: worker.code }); }

  function init() {
    const saved = loadSavedWorker();
    if (saved) {
      autoMsg.textContent = `作業者：${saved.code}  ${saved.name}`;
      autoArea.style.display = 'block';
      loginArea.style.display = 'none';

      btnContinue.onclick = () => goMain(saved);
      btnChange.onclick = () => {
        clearWorker();
        autoArea.style.display = 'none';
        loginArea.style.display = 'block';
        workerCodeInput.focus();
      };
      return;
    }

    autoArea.style.display = 'none';
    loginArea.style.display = 'block';
    workerCodeInput.focus();
  }

  btnLogin.addEventListener('click', () => {
    clearError();
    const code = (workerCodeInput.value || '').trim();

    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.ok) {
          showError(res?.message || 'ログインに失敗しました。');
          return;
        }
        const worker = { code: res.worker.code, name: res.worker.name };
        saveWorker(worker);
        goMain(worker);
      })
      .withFailureHandler(err => {
        showError('サーバーエラー: ' + (err?.message || err));
      })
      .validateWorkerCode(code);
  });

  workerCodeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') btnLogin.click();
  });

  init();
</script>
</body>
</html>
